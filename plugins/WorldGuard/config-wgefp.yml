# WorldGuardExtraFlagsPlus Configuration
# This file is located in the WorldGuard plugin folder
# You can customize plugin behavior here

# IMPORTANT: This file is reloaded when you use /wg reload or /wgefp reload

# =============================================================================
# INDIVIDUAL FLAG SETTINGS
# =============================================================================
# Additional configuration for flags that need extra settings

# Permit workbenches settings
# Controls behavior of the permit-workbenches flag
permit-workbenches:
  # If true, blocks placement of workbench blocks in regions with permit-workbenches flag
  # Default: false
  permit-workbench-block-placement-too: false
  # If true, "ALL" keyword in permit-workbenches flag will also include ender chests
  # Default: false (ALL does not include ender chests by default)
  permit-all-includes-enderchest: false
# Godmode settings
# Controls behavior of the godmode flag
godmode:
  # If true, automatically restore godmode when player leaves a region
  # Default: false
  auto-give-godmode-region-left: false
#  
# =============================================================================
# MASTER FLAG CONTROL
# =============================================================================
# Enable/disable all available flags here
# Set to true to enable, false to disable
# Disabled flags won't be registered (no deprecation warnings on Paper servers)
all-flags-control:
  # LOCATION & TELEPORTATION
  # ------------------------
  teleport-on-entry: true
  teleport-on-exit: true
  # By default its true, if you are not using and want to turn off warns set it to false
  join-location: true
  respawn-location: true
  # COMMAND EXECUTION
  # -----------------
  command-on-entry: true
  command-on-exit: true
  console-command-on-entry: true
  console-command-on-exit: true
  # MOVEMENT & SPEED CONTROL
  # ------------------------
  walk-speed: true
  fly-speed: true
  fly: true
  glide: true
  frostwalker: true
  # PROTECTION & SURVIVAL
  # ---------------------
  godmode: true
  keep-inventory: true
  keep-exp: true
  item-durability: true
  # CHAT MODIFICATION
  # -----------------
  chat-prefix: true
  chat-suffix: true
  # EFFECT CONTROL
  # --------------
  blocked-effects: true
  give-effects: true
  # WORLD INTERACTION
  # -----------------
  worldedit: true
  play-sounds: true
  nether-portals: true
  chunk-unload: true
  villager-trade: true
  inventory-craft: true
  # BLOCK & ITEM CONTROL
  # -------------------
  allow-block-place: true
  deny-block-place: true
  allow-block-break: true
  deny-block-break: true
  deny-item-drops: true
  deny-item-pickup: true
  disable-completely: true
  permit-workbenches: true
  # ENTRY CONTROL
  # -------------
  entry-min-level: true
  entry-max-level: true
  player-count-limit: true
  # SPECIAL FEATURES
  # ----------------
  disable-collision: true
